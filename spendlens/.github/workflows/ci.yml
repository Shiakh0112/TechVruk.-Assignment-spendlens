name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Lint server
        working-directory: server
        run: npm run lint --if-present

      - name: Run audit engine tests
        working-directory: server
        run: npm test
        env:
          NODE_ENV: test

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Lint client
        working-directory: client
        run: npm run lint --if-present

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: /api
